    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Noto Serif SC: 用于按钮/标题,允许 swap (差异不大) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet" />
    <!--
      Ma Shan Zheng: 抓鸡屏号码牌专用毛笔字。
      用 display=optional —— 首屏显示时立刻用回退字体,字体已缓存就直接使用毛笔字,
      没缓存就一直显示回退字体(不会突兀切换,也不会显示空白)。
      首次加载后浏览器会缓存,后续访问即可用毛笔字体。
    -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=optional" />
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=optional" rel="stylesheet" />
